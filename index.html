<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>

<h2>กำลังเปิดระบบจองคิว...</h2>

<script>

async function main(){

    await liff.init({
        liffId:"2010601759-YL0BUmCT"
    });

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    const profile=await liff.getProfile();

    const formUrl =
  "https://docs.google.com/forms/d/e/1FAIpQLSdJURpynPs09wEUFumBMMgiVjaPLGx0IzQbk20Q9s_tv_kcHg/viewform?usp=pp_url" +
  "&entry.1322453872=" + encodeURIComponent(profile.userId);

    window.location.href=formUrl;

}

main();

</script>

</body>
</html>
